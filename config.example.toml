# gcp-authcalator configuration
#
# Pass this file with: gcp-authcalator <command> --config config.toml
# CLI flags take precedence over values in this file.

# GCP project ID (required for all commands)
project_id = "my-gcp-project"

# Service account email to impersonate for dev tokens (required for `gate`)
service_account = "dev-runner@my-gcp-project.iam.gserviceaccount.com"

# Path to the Unix domain socket shared between host and container
# Default: $XDG_RUNTIME_DIR/gcp-authcalator.sock
# (or ~/.gcp-authcalator/gcp-authcalator.sock if XDG_RUNTIME_DIR is unset)
# socket_path = "/run/user/1000/gcp-authcalator.sock"

# Path to the admin socket for approve/deny commands (not mounted into containers)
# Default: /tmp/gcp-authcalator-admin-<uid>/admin.sock
# admin_socket_path = "/tmp/gcp-authcalator-admin-1000/admin.sock"

# TCP port for the metadata proxy
# Default: 8173
# port = 8173

# OAuth scopes for token requests
# Default: ["https://www.googleapis.com/auth/cloud-platform"]
# scopes = ["https://www.googleapis.com/auth/cloud-platform", "https://www.googleapis.com/auth/sqlservice.login"]

# PAM (Privileged Access Manager) — just-in-time prod escalation
# When set, prod token requests trigger a PAM grant before minting the token.
# Can be an entitlement ID (short form) or full resource path.
# pam_policy = "prod-db-admin"

# Additional PAM entitlements that callers may request via query param.
# The default pam_policy is always allowed; these are extras.
# pam_allowed_policies = ["prod-readonly", "prod-migration"]

# PAM entitlement location (default: global)
# pam_location = "global"

# Token lifetime in seconds (default: 3600 / 1 hour)
# Keep this low to limit exfiltration risk. Tokens auto-refresh within sessions.
# token_ttl_seconds = 3600

# Prod session lifetime in seconds (default: 28800 / 8 hours)
# Controls how long with-prod can refresh tokens without re-confirmation.
# session_ttl_seconds = 28800

# ---------------------------------------------------------------------------
# Operator socket — auto-approve for the human operator (gate only)
# ---------------------------------------------------------------------------
#
# Adds a third Unix socket alongside the main + admin sockets. Prod requests
# arriving on this socket auto-approve (no confirmation dialog) when their
# resolved PAM policy is in auto_approve_pam_policies. Trust is a property of
# the socket: filesystem group permissions decide who can connect.
#
# DEPLOYMENT MODEL: human operator and coding agent run as different UIDs in
# the same environment. The operator UID is in operator_socket_group; the
# agent UID is NOT.
#
# SECURITY:
#   - The agent UID MUST NOT be a member of operator_socket_group, or the
#     gate refuses to start (verified at startup against /etc/group).
#   - Sessions (POST /session, GET /token?session=…) return 403 on this
#     socket — there is no 8-hour bearer credential to steal.
#   - auto_approve_pam_policies must be a subset of pam_allowed_policies
#     (or equal pam_policy). Treat additions to this list with the same
#     review rigor as IAM policy changes — anything in this list is granted
#     by *any* code that runs as the operator UID, including malicious code
#     planted via the operator's tooling.
#   - This is Unix-socket-only. Remote (TCP+mTLS) operators do not get
#     auto-approve; they take the standard prompt path.
#
# operator_socket_path = "/run/user/1000/gcp-authcalator-operator.sock"
# operator_socket_group = "gcp-operators"
# auto_approve_pam_policies = ["prod-readonly"]
#
# agent_uid: numeric UID or username. Required when operator_socket_path is
# set so the gate can verify the agent's group memberships at startup.
# agent_uid = 1001
# agent_uid = "claude"

# Extra environment variables for with-prod subprocess.
# Values support ${VAR} and ${VAR:-default} substitution resolved against the
# elevated environment (after GCE_METADATA_HOST etc. are set).
# [env]
# CPL_MACHINE_IS_GCE = "YES"
# CPL_GCE_CREDENTIALS_URL = "http://${GCE_METADATA_HOST:-127.0.0.1:8173}/computeMetadata/v1/instance/service-accounts/default/token"
